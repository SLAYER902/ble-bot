services:
  bot:
    build: .
    command: node dist/src/index.js
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      lavalink:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ble_storage:/app/storage
    ports:
      - '127.0.0.1:3001:3001'
    networks: [ble_internal, ble_egress]
  worker:
    build: .
    command: node dist/src/worker.js
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ble_storage:/app/storage
    networks: [ble_internal]
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ble
      POSTGRES_USER: ble
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ble}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ble -d ble']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [ble_internal]
  redis:
    image: redis:7.4-alpine
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1000']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [ble_internal]
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    environment:
      _JAVA_OPTIONS: '-Xmx512M'
      SERVER_PORT: 2333
      LAVALINK_SERVER_PASSWORD: ${LAVALINK_PASSWORD:-change-me-before-production}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- --header="Authorization: $$LAVALINK_SERVER_PASSWORD" http://localhost:2333/version > /dev/null || exit 1'
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - ./config/lavalink/application.yml:/opt/Lavalink/application.yml:ro
    networks: [ble_internal]

networks:
  ble_internal:
    internal: true
  ble_egress:

volumes:
  postgres_data:
  redis_data:
  ble_storage:
